name: Build & Push Backend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/build-backend.yml"
      - ".github/actions/build-push-ecr/**"
  workflow_dispatch:
    inputs:
      image-tag:
        description: Override image tag (defaults to git SHA)
        required: false

env:
  AWS_REGION: ap-southeast-1          # change to your region
  ECR_REPOSITORY: internship/backend  # change to your ECR repo name

jobs:
  build:
    name: Build backend image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image-tag }}
          SHA: ${{ github.sha }}
        run: |
          TAG="${INPUT_TAG:-$SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          ecr-repository: ${{ env.ECR_REPOSITORY }}
          image-tag: ${{ steps.tag.outputs.tag }}
          context: ./be
          dockerfile: ./be/Dockerfile

  # ── Auto-deploy to staging after every push to develop ──────────────────────
  deploy-staging:
    name: Auto-deploy → staging
    needs: build
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      aws-region: ap-southeast-1
      backend-image-uri: ${{ needs.build.outputs.image-uri }}
      frontend-image-uri: ""
      ecs-cluster: ${{ vars.ECS_CLUSTER_STAGING }}
      backend-service: ${{ vars.ECS_BACKEND_SERVICE_STAGING }}
      frontend-service: ""
      backend-task-definition: ${{ vars.ECS_BACKEND_TASKDEF_STAGING }}
      frontend-task-definition: ""
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN_STAGING }}
