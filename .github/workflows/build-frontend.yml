name: Build & Push Frontend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "fe/**"
      - ".github/workflows/build-frontend.yml"
      - ".github/actions/build-push-ecr/**"
  workflow_dispatch:
    inputs:
      image-tag:
        description: Override image tag (defaults to git SHA)
        required: false
      api-base-url:
        description: NEXT_PUBLIC_API_BASE_URL baked into the bundle
        required: false

env:
  AWS_REGION: ap-southeast-1           # change to your region
  ECR_REPOSITORY: internship/frontend  # change to your ECR repo name

jobs:
  build:
    name: Build frontend image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.tag.outputs.tag }}
      api-url: ${{ steps.api-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image-tag }}
          SHA: ${{ github.sha }}
        run: |
          TAG="${INPUT_TAG:-$SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve API base URL
        id: api-url
        env:
          INPUT_URL: ${{ github.event.inputs.api-base-url }}
          DEFAULT_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          URL="${INPUT_URL:-${DEFAULT_URL:-http://localhost:3001}}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          ecr-repository: ${{ env.ECR_REPOSITORY }}
          image-tag: ${{ steps.tag.outputs.tag }}
          context: ./fe
          dockerfile: ./fe/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.api-url.outputs.url }}

  # ── Auto-deploy to staging after every push to develop ──────────────────────
  deploy-staging:
    name: Auto-deploy → staging
    needs: build
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      aws-region: ap-southeast-1
      backend-image-uri: ""
      frontend-image-uri: ${{ needs.build.outputs.image-uri }}
      ecs-cluster: ${{ vars.ECS_CLUSTER_STAGING }}
      backend-service: ""
      frontend-service: ${{ vars.ECS_FRONTEND_SERVICE_STAGING }}
      backend-task-definition: ""
      frontend-task-definition: ${{ vars.ECS_FRONTEND_TASKDEF_STAGING }}
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN_STAGING }}
