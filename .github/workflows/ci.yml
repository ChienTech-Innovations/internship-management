name: CI

on:
  workflow_call:
    inputs:
      working-directory:
        description: "App directory to validate (e.g. be, fe)"
        required: true
        type: string
      install-flags:
        description: "Extra flags passed to npm ci"
        required: false
        type: string
        default: ""
      run-coverage:
        description: "Run tests with coverage report instead of plain test"
        required: false
        type: boolean
        default: false
    secrets:
      SNYK_TOKEN:
        required: false

permissions:
  packages: write
  contents: write
  checks: read
  actions: write
  id-token: write
  security-events: write

jobs:
  # ── Lint & test ──────────────────────────────────────────────────────────────
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ inputs.install-flags }}

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Run unit tests with coverage
        if: inputs.run-coverage
        continue-on-error: true
        uses: ./.github/actions/unit-test
        with:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}

  # ── SCA security scan ────────────────────────────────────────────────────────
  sca-scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/sca-scan
        with:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
