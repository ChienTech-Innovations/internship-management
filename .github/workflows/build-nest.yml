name: Build & Push Backend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/build-nest.yml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/output-env/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/build-nest.yml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/output-env/**"
  workflow_dispatch:

permissions:
  deployments: read
  pull-requests: read
  repository-projects: read
  actions: write
  checks: read
  contents: write
  packages: write
  id-token: write

env:
  BUILD_CONTEXT: ./be
  BUILD_DOCKERFILE: ./be/Dockerfile

jobs:
  build:
    environment: HUB
    name: Build backend image
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.tag.outputs.tag }}
      region: ${{ steps.output-env.outputs.region }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Output environment variables
        id: output-env
        uses: ./.github/actions/output-env

      - name: Resolve image tag
        id: tag
        env:
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SHORT_SHA="${SHA::7}"
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            TAG="pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            # Sanitize branch name for use as Docker tag
            SAFE_BRANCH="$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')"
            TAG="${SAFE_BRANCH}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ steps.output-env.outputs.region }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: ${{ steps.output-env.outputs.ecr-repository }}
          image-tag: ${{ steps.tag.outputs.tag }}
          tag-latest: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
          context: ${{ env.BUILD_CONTEXT }}
          dockerfile: ${{ env.BUILD_DOCKERFILE }}
