name: Build & Push Backend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/build-nest.yml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/output-env/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "be/**"
      - ".github/workflows/build-nest.yml"
      - ".github/actions/build-push-ecr/**"
      - ".github/actions/output-env/**"
  workflow_dispatch:

permissions:
  deployments: read
  pull-requests: read
  repository-projects: read
  actions: write
  checks: read
  contents: write
  packages: write
  id-token: write

env:
  BUILD_CONTEXT: ./be
  BUILD_DOCKERFILE: ./be/Dockerfile

jobs:
  build:
    environment: HUB
    name: Build backend image
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-tag: ${{ steps.tag.outputs.tag }}
      region: ${{ steps.output-env.outputs.region }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Output environment variables
        id: output-env
        uses: ./.github/actions/output-env

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image-tag }}
          SHA: ${{ github.sha }}
        run: |
          TAG="${INPUT_TAG:-$SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend to ECR
        id: build
        uses: ./.github/actions/build-push-ecr
        with:
          aws-region: ${{ steps.output-env.outputs.region }}
          aws-oidc-role: ${{ vars.AWS_OIDC_ROLE }}
          ecr-repository: ${{ steps.output-env.outputs.ecr-repository }}
          image-tag: ${{ steps.tag.outputs.tag }}
          context: ${{ env.BUILD_CONTEXT }}
          dockerfile: ${{ env.BUILD_DOCKERFILE }}
