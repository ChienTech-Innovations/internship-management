name: Deploy — Staging

# Triggered manually with full ECR image URIs, or called by build workflows.
on:
  workflow_dispatch:
    inputs:
      backend-image-uri:
        description: "Full ECR URI for backend (e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/internship/backend:abc1234)"
        required: true
      frontend-image-uri:
        description: "Full ECR URI for frontend (e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/internship/frontend:abc1234)"
        required: true
  workflow_call:
    inputs:
      backend-image-uri:
        required: true
        type: string
      frontend-image-uri:
        required: true
        type: string
    secrets:
      aws-role-arn:
        required: true

jobs:
  deploy:
    name: Deploy to staging
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
      aws-region: ap-southeast-1
      backend-image-uri: ${{ inputs.backend-image-uri }}
      frontend-image-uri: ${{ inputs.frontend-image-uri }}
      ecs-cluster: ${{ vars.ECS_CLUSTER_STAGING }}
      backend-service: ${{ vars.ECS_BACKEND_SERVICE_STAGING }}
      frontend-service: ${{ vars.ECS_FRONTEND_SERVICE_STAGING }}
      backend-task-definition: ${{ vars.ECS_BACKEND_TASKDEF_STAGING }}
      frontend-task-definition: ${{ vars.ECS_FRONTEND_TASKDEF_STAGING }}
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN_STAGING }}
