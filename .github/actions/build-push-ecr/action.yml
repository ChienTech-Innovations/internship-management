name: Build & Push to ECR
description: Build a Docker image and push it to Amazon ECR

inputs:
  aws-region:
    description: AWS region where ECR lives
    required: true
  aws-role-arn:
    description: IAM role ARN to assume via OIDC
    required: true
  ecr-repository:
    description: ECR repository name (without account/region prefix)
    required: true
  image-tag:
    description: Docker image tag (e.g. git SHA or semver)
    required: true
  context:
    description: Docker build context path
    required: true
  dockerfile:
    description: Path to Dockerfile relative to repo root
    required: true
  build-args:
    description: Newline-separated list of build-arg key=value pairs
    required: false
    default: ""
  platforms:
    description: Target platforms (e.g. linux/amd64,linux/arm64)
    required: false
    default: linux/amd64

outputs:
  image-uri:
    description: Full ECR image URI with tag
    value: ${{ steps.meta.outputs.image-uri }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Compute image URI
      id: meta
      shell: bash
      run: |
        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        IMAGE_URI="${REGISTRY}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
        echo "image-uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
        echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          ${{ steps.meta.outputs.image-uri }}
          ${{ steps.meta.outputs.registry }}/${{ inputs.ecr-repository }}:latest
        build-args: ${{ inputs.build-args }}
        platforms: ${{ inputs.platforms }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
