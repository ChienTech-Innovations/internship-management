name: DAST Scan
description: Runs OWASP ZAP baseline scan against a deployed URL

inputs:
  TARGET_URL:
    description: "URL of the deployed application to scan"
    required: true
  ZAP_RULES_CONFIG:
    description: "Path to ZAP rules configuration file (optional)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run OWASP ZAP Baseline Scan (default rules)
      if: ${{ inputs.ZAP_RULES_CONFIG == '' }}
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: ${{ inputs.TARGET_URL }}
        cmd_options: "-a -j"
        allow_issue_writing: false

    - name: Run OWASP ZAP Baseline Scan (custom rules)
      if: ${{ inputs.ZAP_RULES_CONFIG != '' }}
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: ${{ inputs.TARGET_URL }}
        rules_file_name: ${{ inputs.ZAP_RULES_CONFIG }}
        cmd_options: "-a -j"
        allow_issue_writing: false

    - name: Upload ZAP report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-report-${{ github.sha }}
        path: report_html.html
        retention-days: 7

    - name: DAST scan summary
      if: always()
      shell: bash
      run: |
        echo "## DAST Scan (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Target:** ${{ inputs.TARGET_URL }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Scan type:** Baseline (passive)" >> $GITHUB_STEP_SUMMARY
