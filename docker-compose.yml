services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-internship}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (optional — only needed for RAG/AI chat) ────────────────────────
  # Start with: docker compose --profile rag up
  chroma:
    image: chromadb/chroma:latest
    profiles: [rag]
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  # ── Backend (NestJS) ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Always overrides .env so the service name resolves inside compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-internship}
    env_file:
      # Provides JWT_SECRET, GEMINI_API_KEY, OPENAI_API_KEY, etc.
      # Copy be/.env.example → be/.env and fill in real values.
      - path: ./be/.env
        required: false
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('net').createConnection(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time (NEXT_PUBLIC_* cannot be set at runtime).
        # For production, override with the real backend URL in your CI pipeline.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    restart: unless-stopped
    env_file:
      - path: ./fe/.env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
  chroma_data:
