services:
  # ── Backend (NestJS) ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    restart: unless-stopped
    # environment:
    #   # Always overrides .env so the service name resolves inside compose network.
    #   DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-internship}
    env_file:
      # Provides JWT_SECRET, GEMINI_API_KEY, OPENAI_API_KEY, etc.
      # Copy be/.env.example → be/.env and fill in real values.
      - path: ./be/.env
        required: false
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('net').createConnection(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time (NEXT_PUBLIC_* cannot be set at runtime).
        # For production, override with the real backend URL in your CI pipeline.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    restart: unless-stopped
    env_file:
      - path: ./fe/.env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
